<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Registration</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background-color: #f4f4f4; }
        .form-container { background: white; padding: 20px; max-width: 400px; border-radius: 8px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .error-text { color: red; font-size: 13px; display: block; margin-top: 5px; }
        button { background: #007BFF; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Create Account</h2>
        <form id="signupForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username">
                <span id="usernameError" class="error-text"></span>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="text" id="email" placeholder="Enter email">
                <span id="emailError" class="error-text"></span>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password">
                <span id="passwordError" class="error-text"></span>
            </div>

            <button type="submit" id="submitBtn">Sign Up</button>
        </form>
    </div>

    <div class="form-container" style="margin-top: 20px;">
        <h3>Account Verification</h3>
        <button id="resendBtn" disabled>Resend Verification (10s)</button>
    </div>

    <script src="validation.js"></script>
    <script src="async.js"></script>
</body>
</html>
